<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="grad" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </radialGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="1024" height="1024" rx="240" fill="url(#grad)"/>

  <!-- Stylized "V" made from wire/tool-style lines -->
  <path d="M300 320 L512 720 L724 320" 
        stroke="white" 
        stroke-width="60" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none"/>

  <!-- Circles at the end of each line to look like tool caps/joints -->
  <circle cx="300" cy="320" r="30" fill="white"/>
  <circle cx="724" cy="320" r="30" fill="white"/>
  <circle cx="512" cy="720" r="30" fill="white"/>
</svg>
